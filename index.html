<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte Diario - Control de internos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Librería para exportar a PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container" id="reporte-pdf">
        <header>
            <h1>PARTE DIARIO</h1>
            <div class="header-labels">
               <!-- <span>INTERNOS</span>-->
                <span>INTERNOS / CAPACIDAD</span>
            </div>
        </header>

        <main id="data-container">
            <!-- Los datos se cargan dinámicamente aquí -->
        </main>

        <footer>
            <div class="total-card">
                <span class="label">CAPACIDAD TOTAL</span>
                <div class="values">
                    <span id="total-internos" class="internos-val">0</span>
                    <span id="total-capacidad" class="capacidad-val">66</span>
                </div>
            </div>

            <!-- Contenedor de fecha seguro -->
            <p class="fecha-footer" id="fecha-actual"></p>
            
            <!-- Botón de Exportación -->
            <button id="btn-exportar" class="export-btn" onclick="exportarPDF()">Exportar a PDF</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
