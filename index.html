<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte Diario - Control de Internos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>PARTE DIARIO</h1>
            <div class="header-labels">
                <span>INTERNOS</span>
                <span>CAPACIDAD</span>
            </div>
        </header>

        <main id="data-container">
            <!-- Los datos se cargan dinámicamente aquí -->
        </main>

        <footer>
            <div class="total-card">
                <span class="label">CAPACIDAD TOTAL</span>
                <div class="values">
                    <span id="total-internos" class="internos-val">0</span>
                    <span id="total-capacidad" class="capacidad-val">66</span>
                </div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
