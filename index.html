<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte Diario - Control de Internos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Librería externa para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container" id="reporte-pdf">
        <header>
            <h1>PARTE DIARIO</h1>
            <div class="header-labels">
                <span>INTERNOS</span>
                <span>CAPACIDAD</span>
            </div>
        </header>

        <main id="data-container">
            <!-- Sectores cargados dinámicamente: Pabellones, Celdas, etc. -->
        </main>

        <footer>
            <div class="total-card">
                <span class="label">CAPACIDAD TOTAL</span>
                <div class="values">
                    <span id="total-internos" class="internos-val">0</span>
                    <span id="total-capacidad" class="capacidad-val">66</span>
                </div>
            </div>
            
            <div id="timestamp" class="timestamp">
                <!-- Fecha y hora se insertan aquí -->
            </div>

            <button id="btn-exportar" class="export-btn">Exportar a PDF</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
